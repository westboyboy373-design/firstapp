name: Build Android APK

on:
  push:
    branches: [ "main", "master", "MACARTHY" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Installs standalone Gradle 8.7 directly on the virtual runner
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # Generates local.properties so Gradle knows where the Android SDK lives
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # Builds the APK using system Gradle (no gradlew script needed!)
      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --stacktrace

      # Uploads the compiled APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: westboy-camera-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
